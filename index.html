<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Michal Control Panel</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js/dist/umd/supabase.js"></script>
</head>
<body>
    <h1>Michal Control Panel</h1>
    <div id="logs"></div>
    <script>
        const supabaseUrl = 'https://YOUR_SUPABASE_URL';
        const supabaseKey = 'YOUR_SUPABASE_ANON_KEY';
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);

        async function logActivity(action) {
            const { data, error } = await supabase
              .from('activity_log')
              .insert([{
                  action: action,
                  gmt_time: new Date().toISOString()
              }]);
            if (error) console.error('Error logging activity:', error);
            else console.log('Activity logged:', data);
        }

        // Example usage
        logActivity('Loaded Michal Control Panel');

        // Display logs function can be added here
    </script>
</body>
</html>
