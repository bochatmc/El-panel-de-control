<!DOCTYPE html>
<html>
<head>
    <title>Michal Control</title>
    <style>
        body { background: #020617; color: #fff; font-family: Arial; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .card { background: #1e293b; padding: 2rem; border-radius: 20px; max-width: 400px; text-align: center; border: 1px solid #334155; }
        h1 { color: #60a5fa; margin: 0 0 0.5rem 0; }
        .timer { font-size: 3rem; font-weight: bold; color: #3b82f6; margin: 2rem 0; font-family: monospace; }
        button { padding: 1rem; margin: 0.5rem; background: #2563eb; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 48%; }
        button.red { background: #dc2626; }
        .status { font-size: 1.5rem; font-weight: bold; color: #f59e0b; margin: 1rem 0; }
        .status.open { color: #ef4444; }
    </style>
</head>
<body>
    <div class="card">
        <h1>MICHAL</h1>
        <p>Propiedad de Yanina Colombo</p>
        <div class="timer" id="timer">00:00:00</div>
        <p>Estado: <span class="status" id="status">CONFINADO</span></p>
        <button onclick="setStatus('CONFINADO')">Jaula Cerrada</button>
        <button class="red" onclick="setStatus('ABIERTO')">Abierto</button>
        <button onclick="sendWhatsApp()" style="width: 100%; margin-top: 1rem; background: #25d366;">📱 Notificar a Yanina</button>
    </div>

    <script>
        let status = localStorage.getItem('status') || 'CONFINADO';
        document.getElementById('status').textContent = status;
        
        function updateTimer() {
            const start = new Date('2026-03-04T20:00:00');
            const now = new Date();
            const diff = now - start;
            if (diff > 0) {
                const h = Math.floor(diff / 3600000);
                const m = Math.floor((diff % 3600000) / 60000);
                const s = Math.floor((diff % 60000) / 1000);
                document.getElementById('timer').textContent = 
                    String(h).padStart(2, '0') + ':' + 
                    String(m).padStart(2, '0') + ':' + 
                    String(s).padStart(2, '0');
            }
        }
        
        function setStatus(s) {
            status = s;
            localStorage.setItem('status', s);
            document.getElementById('status').textContent = s;
            document.getElementById('status').className = s === 'CONFINADO' ? 'status' : 'status open';
        }
        
        function sendWhatsApp() {
            const url = window.location.href.replace('index.html', 'yanina.html');
            const msg = 'Estado: ' + status + '. Ver aquí: ' + url;
            window.open('https://wa.me/34657442002?text=' + encodeURIComponent(msg), '_blank');
        }
        
        updateTimer();
        setInterval(updateTimer, 1000);
    </script>
</body>
</html>
