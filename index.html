<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control Panel</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script>
        const supabaseUrl = 'https://fqhgvjnbxyiwhajedwut.supabase.co';
        const supabaseKey = 'sb_publishable_R1SJPawU56LPtwjjI-mebA_YovmaKDb';
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);

        // Example function to log activity
        async function logActivity(activity) {
            const { data, error } = await supabase
                .from('activity_log')
                .insert([ { activity } ]);
            if (error) console.error('Error logging activity:', error);
            else console.log('Activity logged:', data);
        }

        // Example of logging an activity
        logActivity('Page accessed on '+ new Date().toISOString());
    </script>
</head>
<body>
    <h1>Control Panel</h1>
    <p>Welcome to the control panel.</p>
</body>
</html>
