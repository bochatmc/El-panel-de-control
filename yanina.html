<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yanina Monitoring Panel</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/supabase/2.0.5/supabase.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; }
        .activity-log { margin: 20px; }
        .icon { width: 20px; height: 20px; vertical-align: middle; }
        .closed { color: green; }
        .open { color: red; }
    </style>
</head>
<body>
    <h1>Yanina Monitoring Panel</h1>
    <div class="activity-log" id="activity-log"></div>
    <script>
        const supabaseUrl = 'https://your-supabase-url.supabase.co';
        const supabaseKey = 'your-supabase-key';
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);

        async function fetchActivity() {
            const { data, error } = await supabase
                .from('activity_logs')
                .select('*')
                .order('timestamp', { ascending: false });
            if (error) console.error('Error fetching activity log:', error);
            else renderActivityLog(data);
        }

        function renderActivityLog(data) {
            const logContainer = document.getElementById('activity-log');
            logContainer.innerHTML = '';
            data.forEach(log => {
                const icon = log.status === 'CONFINADO' ? 
                    '<span class="closed">🟢</span>' : 
                    '<span class="open">🔴</span>';
                logContainer.innerHTML += `<div>${icon} ${log.message} at ${new Date(log.timestamp).toLocaleString()}</div>`;
            });
        }

        fetchActivity();
        const intervalId = setInterval(fetchActivity, 3000);

        supabase.from('activity_logs').on('INSERT', payload => {
            fetchActivity();
        }).subscribe();
    </script>
</body>
</html>
