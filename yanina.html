<!DOCTYPE html>
<html>
<head>
    <title>Yanina - Panel</title>
    <style>
        body { background: #020617; color: #fff; font-family: Arial; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .card { background: #1e293b; padding: 2rem; border-radius: 20px; max-width: 400px; text-align: center; border: 1px solid #334155; }
        .badge { background: red; padding: 0.5rem; margin-bottom: 1rem; border-radius: 8px; font-weight: bold; }
        h1 { color: #60a5fa; margin: 0 0 0.5rem 0; }
        .timer { font-size: 3rem; font-weight: bold; color: #3b82f6; margin: 2rem 0; font-family: monospace; }
        .status { font-size: 1.5rem; font-weight: bold; color: #f59e0b; margin: 1rem 0; }
        .status.open { color: #ef4444; }
        .time { color: #60a5fa; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="card">
        <div class="badge">🔒 SOLO LECTURA</div>
        <h1>MICHAL</h1>
        <p>Observado por Yanina</p>
        <div class="timer" id="timer">00:00:00</div>
        <p>Estado: <span class="status" id="status">CONFINADO</span></p>
        <p class="time">Última: <span id="time">Esperando...</span></p>
    </div>

    <script>
        function checkStatus() {
            const status = localStorage.getItem('status');
            const time = localStorage.getItem('time');
            if (status) document.getElementById('status').textContent = status;
            if (time) document.getElementById('time').textContent = time;
        }
        
        function updateTimer() {
            const start = new Date('2026-03-04T20:00:00');
            const now = new Date();
            const diff = now - start;
            if (diff > 0) {
                const h = Math.floor(diff / 3600000);
                const m = Math.floor((diff % 3600000) / 60000);
                const s = Math.floor((diff % 60000) / 1000);
                document.getElementById('timer').textContent = 
                    String(h).padStart(2, '0') + ':' + 
                    String(m).padStart(2, '0') + ':' + 
                    String(s).padStart(2, '0');
            }
        }
        
        const params = new URLSearchParams(window.location.search);
        const s = params.get('s');
        if (s) {
            const status = s === 'C' ? 'CONFINADO' : 'ABIERTO';
            localStorage.setItem('status', status);
            localStorage.setItem('time', new Date().toLocaleString('es-ES'));
            document.getElementById('status').textContent = status;
            document.getElementById('time').textContent = new Date().toLocaleString('es-ES');
        }
        
        checkStatus();
        updateTimer();
        setInterval(updateTimer, 1000);
        setInterval(checkStatus, 500);
    </script>
</body>
</html>
