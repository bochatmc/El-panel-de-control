<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Yanina</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial; background: #020617; color: white; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card { background: #1e293b; padding: 2rem; border-radius: 20px; max-width: 400px; border: 1px solid #334155; }
        h1 { color: #60a5fa; margin-bottom: 1rem; text-align: center; }
        .timer { font-size: 2.5rem; font-weight: bold; color: #3b82f6; margin: 1.5rem 0; text-align: center; }
        .status { background: rgba(15,23,42,0.5); padding: 1rem; border-radius: 8px; margin: 1rem 0; text-align: center; }
        .timestamp { background: rgba(15,23,42,0.5); padding: 1rem; border-radius: 8px; margin: 1rem 0; text-align: center; font-size: 0.9rem; }
        .badge { background: rgba(100,116,139,0.3); padding: 0.5rem; border-radius: 4px; text-align: center; margin-bottom: 1rem; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        function App() {
            const [timer, setTimer] = useState("00:00:00");
            const [status, setStatus] = useState("CONFINADO");
            const [time, setTime] = useState("Nunca");

            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                const s = params.get('s');
                if (s) {
                    const newStatus = s === 'C' ? 'CONFINADO' : 'ABIERTO / HIGIENE';
                    setStatus(newStatus);
                    setTime(new Date().toLocaleString('es-ES'));
                }

                const interval = setInterval(() => {
                    const start = new Date('2026-03-04T20:00:00');
                    const now = new Date();
                    const diff = now - start;
                    if (diff > 0) {
                        const h = Math.floor(diff / 3600000);
                        const m = Math.floor((diff % 3600000) / 60000);
                        const s = Math.floor((diff % 60000) / 1000);
                        setTimer(`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`);
                    }
                }, 1000);
                return () => clearInterval(interval);
            }, []);

            return (
                <div className="card">
                    <div className="badge">🔒 PANEL SOLO LECTURA - YANINA</div>
                    <h1>Michal - Estado Actual</h1>
                    <div className="timer">{timer}</div>
                    <div className="status">
                        <p>Estado: <strong style={{color: status === 'CONFINADO' ? '#f59e0b' : '#ef4444'}}>{status}</strong></p>
                    </div>
                    <div className="timestamp">Última actualización: <br/><strong>{time}</strong></div>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
