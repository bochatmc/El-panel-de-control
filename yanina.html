<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Panel de Yanina</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@700&display=swap');
        
        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: #020617; 
            color: #e2e8f0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            margin: 0;
            overflow-x: hidden;
        }
        
        .mono { font-family: 'JetBrains+Mono', monospace; }
        .glow { box-shadow: 0 0 25px rgba(59, 130, 246, 0.3); }

        .app-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        @keyframes pulse-red {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        .animate-pulse-red {
            animation: pulse-red 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [timeLocked, setTimeLocked] = useState("00:00:00");
            const [daysLocked, setDaysLocked] = useState(0);
            const [status, setStatus] = useState("CONFINADO");
            const [timestamp, setTimestamp] = useState("Esperando...");

            useEffect(() => {
                // Sincronizar desde localStorage (se actualiza cuando Michal cambia estado)
                const checkStatus = () => {
                    const savedStatus = localStorage.getItem('michal_status');
                    const savedTime = localStorage.getItem('michal_timestamp');
                    if (savedStatus) {
                        setStatus(savedStatus);
                        if (savedTime) setTimestamp(savedTime);
                    }
                };

                // Verificar URL params por si Michal envía link
                const params = new URLSearchParams(window.location.search);
                const syncStatus = params.get('s');
                if (syncStatus) {
                    const decodedStatus = syncStatus === 'C' ? 'CONFINADO' : 'ABIERTO / HIGIENE';
                    setStatus(decodedStatus);
                    localStorage.setItem('yanina_status', decodedStatus);
                    const now = new Date().toLocaleString('es-ES', {day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit', second:'2-digit'});
                    setTimestamp(now);
                    window.history.replaceState({}, document.title, window.location.pathname);
                }

                checkStatus();

                // Polling cada 500ms para detectar cambios en localStorage
                const interval = setInterval(checkStatus, 500);

                // Cronómetro
                const activationDate = new Date('2026-03-04T20:00:00');
                const timer = setInterval(() => {
                    const now = new Date();
                    const diff = now - activationDate;
                    if (diff > 0) {
                        const d = Math.floor(diff / (1000 * 60 * 60 * 24));
                        const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                        const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                        const s = Math.floor((diff % (1000 * 60)) / 1000);
                        setDaysLocked(d);
                        setTimeLocked(\`\${h.toString().padStart(2, '0')}:\${m.toString().padStart(2, '0')}:\${s.toString().padStart(2, '0')}\`);
                    }
                }, 1000);

                return () => {
                    clearInterval(interval);
                    clearInterval(timer);
                };
            }, []);

            return (
                <div className="app-container">
                    <div className="max-w-md w-full bg-slate-900 border border-slate-800 rounded-[2.5rem] overflow-hidden shadow-2xl relative">
                        
                        {/* Badge */}
                        <div className="bg-slate-950/50 border-b border-slate-800 p-3 text-center">
                            <p className="text-[8px] text-slate-400 uppercase tracking-widest font-bold">🔒 PANEL SOLO LECTURA</p>
                        </div>

                        {/* Header de Identificación */}
                        <div className="bg-gradient-to-b from-slate-800 to-slate-900 p-8 text-center border-b border-slate-800">
                            <div className="flex justify-center mb-4">
                                <div className="p-4 bg-slate-900 rounded-full border border-blue-500/30 glow">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"/>
                                        <path d="m9 12 2 2 4-4"/>
                                    </svg>
                                </div>
                            </div>
                            <h1 className="text-2xl font-black tracking-tighter text-white uppercase italic">Sujeto 950321</h1>
                            <p className="text-[10px] text-blue-400 font-bold uppercase tracking-[0.3em] mt-1">Observado por Yanina</p>
                        </div>

                        <div className="p-6 space-y-6">
                            
                            {/* Cronómetro de Tiempo Confinado */}
                            <div className="space-y-2 text-center">
                                <p className="text-[9px] font-bold text-slate-500 uppercase tracking-widest">Tiempo Total en Castidad</p>
                                <div className="bg-slate-950 border border-slate-800 p-6 rounded-3xl relative overflow-hidden">
                                    <div className="absolute top-0 left-0 w-full h-1 bg-blue-600"></div>
                                    <div className="flex items-baseline justify-center gap-1">
                                        {daysLocked > 0 && <span className="text-xl font-bold text-slate-400 mr-2">{daysLocked}d</span>}
                                        <span className="text-5xl font-black text-white tracking-tighter mono">{timeLocked}</span>
                                    </div>
                                </div>
                            </div>

                            {/* Estado Físico Actual */}
                            <div className="grid grid-cols-2 gap-4">
                                <div className={\`p-4 rounded-2xl border transition-all text-center flex flex-col justify-center min-h-[80px] \${status === 'CONFINADO' ? 'bg-slate-800/40 border-slate-800' : 'bg-red-900/20 border-red-500/50 shadow-[0_0_15px_rgba(239,68,68,0.1)]'}\`}>
                                    <p className="text-[9px] text-slate-500 uppercase font-bold mb-1">Estado Físico</p>
                                    <p className={\`text-sm font-black uppercase tracking-tight \${status === 'CONFINADO' ? 'text-orange-500' : 'text-red-500 animate-pulse-red'}\`}>{status}</p>
                                </div>
                                <div className="bg-slate-800/40 p-4 rounded-2xl border border-slate-800 text-center flex flex-col justify-center min-h-[80px]">
                                    <p className="text-[9px] text-slate-500 uppercase font-bold mb-1">Pruebas</p>
                                    <p className="text-sm font-black text-purple-500 uppercase tracking-tight">Requeridas</p>
                                </div>
                            </div>

                            {/* Controles Bloqueados */}
                            <div className="space-y-3 opacity-50 pointer-events-none">
                                <p className="text-[8px] text-center text-slate-600 uppercase tracking-widest italic font-bold">Panel Deshabilitado para Lectura</p>
                                <div className="flex gap-2">
                                    <button className="flex-1 py-4 rounded-2xl text-[10px] font-black uppercase tracking-widest bg-slate-800 text-slate-500 border border-slate-700">
                                        Jaula Cerrada
                                    </button>
                                    <button className="flex-1 py-4 rounded-2xl text-[10px] font-black uppercase tracking-widest bg-slate-800 text-slate-500 border border-slate-700">
                                        Abierto / Higiene
                                    </button>
                                </div>
                            </div>

                            {/* Último Cambio */}
                            <div className="bg-slate-950/50 p-4 rounded-2xl border border-slate-800 text-center">
                                <p className="text-[9px] text-slate-500 uppercase font-bold mb-2">Última Actualización</p>
                                <p className="text-[10px] text-blue-400 font-black">{timestamp}</p>
                            </div>

                            {/* Sección de Directrices Contractuales */}
                            <div className="bg-slate-950/50 p-5 rounded-2xl border border-slate-800">
                                <div className="flex items-center justify-between border-b border-slate-800 pb-2 mb-3">
                                    <span className="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Directrices</span>
                                    <span className="text-[9px] font-bold text-blue-500 italic uppercase">Contrato Colombo-Bochat</span>
                                </div>
                                <ul className="space-y-3 text-[10px] text-slate-400">
                                    <li className="flex gap-3 leading-relaxed">
                                        <span className="text-blue-500 font-bold shrink-0">●</span>
                                        <span>Castidad 24/7. Llaves bajo custodia absoluta de la Reina.</span>
                                    </li>
                                    <li className="flex gap-3 leading-relaxed">
                                        <span className="text-blue-500 font-bold shrink-0">●</span>
                                        <span>Reportes Visuales requeridos: Entrega obligatoria de pruebas fotográficas pre y post ducha.</span>
                                    </li>
                                    <li className="flex gap-3 leading-relaxed">
                                        <span className="text-red-500 font-bold shrink-0">●</span>
                                        <span>La desobediencia implica consecuencias de acuerdo con la cláusula novena del contrato.</span>
                                    </li>
                                </ul>
                            </div>
                        </div>

                        {/* Pie de Página */}
                        <div className="p-4 bg-slate-950/80 text-center text-[7px] text-slate-600 font-bold uppercase tracking-[0.4em] border-t border-slate-800/50">
                            Vinculación Digital Perpetua
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
