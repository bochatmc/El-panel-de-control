<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control Panel App</title>
    <style>
        body { background-color: #181818; color: white; font-family: Arial, sans-serif; }
        button { background-color: #4CAF50; color: white; border: none; padding: 10px 20px; cursor: pointer; }
        button:hover { background-color: #45a049; }
    </style>
</head>
<body>
    <h1>Aplicación del Panel de Control</h1>
    <div>
        <h2>Estado:</h2>
        <button id="confinedBtn">CONFINADO</button>
        <button id="openBtn">ABIERTO/HIGIENE</button>
    </div>
    <div>
        <h2>Tiempo:</h2>
        <p id="timer"></p>
    </div>
    <div>
        <button id="whatsappShare">Compartir en WhatsApp</button>
    </div>
    
    <script>
        const timerElement = document.getElementById('timer');
        const confinedButton = document.getElementById('confinedBtn');
        const openButton = document.getElementById('openBtn');
        const whatsappButton = document.getElementById('whatsappShare');
        
        // Timer functionality
        const endDate = new Date('2026-03-04T20:00:00Z');
        const updateTimer = () => {
            const now = new Date();
            const remainingTime = endDate - now;
            const hours = Math.floor((remainingTime % (1000 * 3600 * 24)) / (1000 * 3600));
            const minutes = Math.floor((remainingTime % (1000 * 3600)) / (1000 * 60));
            const seconds = Math.floor((remainingTime % (1000 * 60)) / 1000);
            timerElement.innerText = `${hours}h ${minutes}m ${seconds}s`;
        };
        setInterval(updateTimer, 1000);
        
        // Status handling with localStorage
        confinedButton.addEventListener('click', () => {
            localStorage.setItem('status', 'CONFINADO');
            alert('Estado guardado: CONFINADO');
        });

        openButton.addEventListener('click', () => {
            localStorage.setItem('status', 'ABIERTO/HIGIENE');
            alert('Estado guardado: ABIERTO/HIGIENE');
        });

        // WhatsApp share functionality
        whatsappButton.addEventListener('click', () => {
            const status = localStorage.getItem('status') || 'No hay estado guardado';
            const url = `https://api.whatsapp.com/send?text=Estado: ${status}`;
            window.open(url, '_blank');
        });
    </script>
    <footer>
        <p>Detalles del contrato: Este es un contrato de prueba en español para la aplicación de control.</p>
    </footer>
</body>
</html>
